<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; frame-src https://*.google.com https://google.com; connect-src 'self' https://vxwjgxdlnwhatnbhjabw.supabase.co; form-action 'self' https://vxwjgxdlnwhatnbhjabw.supabase.co">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminstatus – de Vries</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32.png?v=3">
<link rel="icon" type="image/png" sizes="16x16" href="assets/img/favicon-16.png?v=3">
<link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png?v=3">
<style>
  @font-face{font-family:'Fraunces';font-style:normal;font-weight:300 700;font-display:swap;src:url('assets/fonts/fraunces-latin.woff2') format('woff2')}
  @font-face{font-family:'Manrope';font-style:normal;font-weight:300 800;font-display:swap;src:url('assets/fonts/manrope-latin.woff2') format('woff2')}
  :root{--red:#d7120a;--ink:#1c1714;--muted:#756a60;--paper:#faf6f0;--line:rgba(28,23,20,.12)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Manrope",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;display:grid;place-items:center;padding:1.5rem;line-height:1.6}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;max-width:460px;width:100%;padding:clamp(2.4rem, 1.8rem + 2.5vw, 3.4rem) clamp(1.8rem, 1.2rem + 2.5vw, 2.8rem);text-align:center;box-shadow:0 40px 80px -50px rgba(28,23,20,.4)}
  .logo{display:inline-block;width:74px;height:74px;border-radius:16px;object-fit:cover;margin-bottom:1.6rem;box-shadow:0 10px 26px -12px rgba(215,18,10,.5)}
  .mark{width:60px;height:60px;border-radius:50%;display:grid;place-items:center;margin:0 auto 1.3rem;font-size:1.8rem}
  .mark.ok{background:#e7f4e3;color:#3b932b}
  .mark.no{background:#f4d9d6;color:var(--red)}
  .mark.neutral{background:#f1e9de;color:var(--muted)}
  h1{font-family:"Fraunces",serif;font-weight:500;font-size:clamp(1.6rem, 1.3rem + 1.2vw, 2.1rem);letter-spacing:-.02em;margin-bottom:.8rem}
  p{color:var(--muted);font-size:1.02rem}
  .btn{display:inline-flex;align-items:center;gap:.5em;margin-top:1.8rem;padding:.9em 1.6em;border-radius:999px;background:var(--red);color:#fff;text-decoration:none;font-weight:700;font-size:.95rem;transition:transform .2s,box-shadow .3s}
  .btn:hover{transform:translateY(-2px);box-shadow:0 14px 34px -12px rgba(215,18,10,.5)}
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="assets/img/devries-logo.jpg" alt="de Vries" width="74" height="74">
    <div class="mark neutral" id="mark">…</div>
    <h1 id="title">Terminstatus</h1>
    <p id="msg">Einen Moment …</p>
    <a class="btn" href="index.html">Zur Startseite
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M7 7h10v10"/></svg>
    </a>
  </div>
<script>
  (function () {
    var s = new URLSearchParams(location.search).get("s") || "";
    var M = {
      "confirmed":        ["ok", "✓", "Termin bestätigt", "Der Termin ist bestätigt – der Zeit-Slot ist jetzt auf der Website gesperrt."],
      "declined":         ["no", "✕", "Termin abgelehnt", "Die Anfrage wurde abgelehnt. Der Zeit-Slot bleibt frei."],
      "already-confirmed":["ok", "✓", "Bereits bestätigt", "Dieser Termin war bereits bestätigt."],
      "already-declined": ["neutral", "–", "Bereits abgelehnt", "Diese Anfrage war bereits abgelehnt."],
      "taken":            ["no", "!", "Termin nicht mehr verfügbar", "Dieser Zeit-Slot ist inzwischen belegt – für diese Uhrzeit wurde bereits ein anderer Termin bestätigt. Bitte bieten Sie dem Kunden einen anderen freien Termin an."],
      "notfound":         ["no", "!", "Nicht gefunden", "Diese Terminanfrage wurde nicht gefunden (evtl. bereits bearbeitet oder gelöscht)."],
      "invalid":          ["no", "!", "Ungültiger Link", "Dieser Bestätigungslink ist ungültig oder unvollständig."]
    };
    var m = M[s] || ["neutral", "i", "Terminstatus", "Kein Status angegeben."];
    var mark = document.getElementById("mark");
    mark.className = "mark " + m[0];
    mark.textContent = m[1];
    document.getElementById("title").textContent = m[2];
    document.getElementById("msg").textContent = m[3];
    document.title = m[2] + " – de Vries";
  })();
</script>
</body>
</html>
