<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Termin bestätigen – de Vries</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32.png?v=3">
<link rel="icon" type="image/png" sizes="16x16" href="assets/img/favicon-16.png?v=3">
<link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png?v=3">
<style>
  @font-face{font-family:'Fraunces';font-style:normal;font-weight:300 700;font-display:swap;src:url('assets/fonts/fraunces-latin.woff2') format('woff2')}
  @font-face{font-family:'Manrope';font-style:normal;font-weight:300 800;font-display:swap;src:url('assets/fonts/manrope-latin.woff2') format('woff2')}
  :root{--red:#d7120a;--green:#3b932b;--ink:#1c1714;--muted:#756a60;--paper:#faf6f0;--line:rgba(28,23,20,.12)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Manrope",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;display:grid;place-items:center;padding:1.5rem;line-height:1.6}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;max-width:460px;width:100%;padding:clamp(2rem,1.4rem+2vw,3rem);text-align:center;box-shadow:0 40px 80px -50px rgba(28,23,20,.4)}
  .logo{display:inline-grid;place-items:center;width:52px;height:52px;border-radius:11px;background:var(--red);color:#fff;font-family:"Fraunces",serif;font-weight:600;font-size:1.5rem;letter-spacing:.04em;margin-bottom:1.6rem}
  .mark{width:60px;height:60px;border-radius:50%;display:grid;place-items:center;margin:0 auto 1.3rem;font-size:1.8rem}
  .mark.ok{background:#e7f4e3;color:var(--green)}
  .mark.no{background:#f4d9d6;color:var(--red)}
  .mark.neutral{background:#f1e9de;color:var(--muted)}
  h1{font-family:"Fraunces",serif;font-weight:500;font-size:clamp(1.6rem,1.3rem+1.2vw,2.1rem);letter-spacing:-.02em;margin-bottom:.8rem}
  p{color:var(--muted);font-size:1.02rem}
  .act{margin-top:1.8rem;display:flex;flex-direction:column;gap:.7rem;align-items:center}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5em;padding:.95em 1.8em;border-radius:999px;border:0;cursor:pointer;text-decoration:none;font-family:inherit;font-weight:700;font-size:1rem;transition:transform .2s,box-shadow .3s}
  .btn:hover{transform:translateY(-2px)}
  .btn--go{background:var(--red);color:#fff}
  .btn--go:hover{box-shadow:0 14px 34px -12px rgba(215,18,10,.5)}
  .btn--sec{background:transparent;color:var(--muted);font-weight:600;font-size:.9rem;padding:.5em 1em}
  .btn--sec:hover{color:var(--ink)}
  .note{margin-top:1.4rem;font-size:.82rem;color:var(--muted);opacity:.85}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">dV</div>
    <div class="mark neutral" id="mark">?</div>
    <h1 id="title">Einen Moment …</h1>
    <p id="msg"></p>
    <form class="act" id="form" method="POST" action="https://vxwjgxdlnwhatnbhjabw.supabase.co/functions/v1/devries-booking/confirm" style="display:none">
      <input type="hidden" name="token" id="tk">
      <input type="hidden" name="action" id="ac">
      <button type="submit" class="btn btn--go" id="go">Bestätigen</button>
      <a class="btn btn--sec" href="index.html">Abbrechen</a>
    </form>
    <p class="note" id="note" style="display:none">Zur Sicherheit lösen Sie die Aktion hier per Klick aus – automatische E-Mail-Scanner können so nichts mehr auslösen.</p>
  </div>
<script>
  (function () {
    var p = new URLSearchParams(location.search);
    var token = (p.get("token") || "").trim();
    var action = (p.get("action") || "").trim();
    var mark = document.getElementById("mark");
    var title = document.getElementById("title");
    var msg = document.getElementById("msg");
    var form = document.getElementById("form");
    var note = document.getElementById("note");
    var valid = /^[0-9a-f-]{36}$/i.test(token) && (action === "confirm" || action === "decline");
    if (!valid) {
      mark.className = "mark no"; mark.textContent = "!";
      title.textContent = "Ungültiger Link";
      msg.textContent = "Dieser Bestätigungslink ist ungültig oder unvollständig.";
      return;
    }
    document.getElementById("tk").value = token;
    document.getElementById("ac").value = action;
    var go = document.getElementById("go");
    if (action === "confirm") {
      mark.className = "mark ok"; mark.textContent = "✓";
      title.textContent = "Termin bestätigen?";
      msg.textContent = "Möchten Sie diese Terminanfrage bestätigen? Der Zeit-Slot wird dann auf der Website gesperrt und der Kunde erhält eine Bestätigung.";
      go.textContent = "Ja, Termin bestätigen";
      go.className = "btn btn--go";
    } else {
      mark.className = "mark no"; mark.textContent = "–";
      title.textContent = "Termin ablehnen?";
      msg.textContent = "Möchten Sie diese Terminanfrage ablehnen? Der Zeit-Slot bleibt frei.";
      go.textContent = "Ja, Termin ablehnen";
      go.className = "btn btn--go";
    }
    form.style.display = "flex";
    note.style.display = "block";
    document.title = title.textContent + " – de Vries";
  })();
</script>
</body>
</html>
