<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Inhalts-Editor – de Vries</title>
<style>
  :root{--red:#d7120a;--ink:#1c1714;--muted:#756a60;--paper:#faf6f0;--paper2:#f1e9de;--line:rgba(28,23,20,.14);--ok:#3b932b}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--paper);color:var(--ink);line-height:1.55;padding:1.2rem}
  .wrap{max-width:680px;margin:0 auto}
  .logo{display:inline-grid;place-items:center;width:46px;height:46px;border-radius:10px;background:var(--red);color:#fff;font-weight:800;letter-spacing:1px;font-size:1.2rem}
  h1{font-size:1.5rem;margin:.8rem 0 .2rem}
  .sub{color:var(--muted);font-size:.95rem;margin-bottom:1.4rem}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:1.3rem;margin-bottom:1.1rem}
  .card h2{font-size:1.05rem;margin-bottom:.9rem}
  label{display:block;font-size:.82rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:.7rem 0 .3rem}
  input[type=text],input[type=password],textarea{width:100%;padding:.7rem .8rem;border:1px solid var(--line);border-radius:9px;font:inherit;background:var(--paper)}
  textarea{min-height:90px;resize:vertical}
  .btn{display:inline-flex;align-items:center;gap:.4em;border:0;border-radius:999px;background:var(--red);color:#fff;font-weight:700;font-size:.95rem;padding:.75em 1.4em;cursor:pointer;transition:transform .15s,opacity .2s}
  .btn:hover{transform:translateY(-1px)}
  .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .btn--ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .row{display:flex;gap:.7rem;flex-wrap:wrap;align-items:center;margin-top:1rem}
  .status{font-size:.92rem;margin-top:.8rem;min-height:1.2em}
  .status.ok{color:var(--ok)} .status.err{color:var(--red)}
  .hint{font-size:.85rem;color:var(--muted);margin-top:.3rem}
  img.preview{max-width:100%;border-radius:10px;margin-top:.6rem;border:1px solid var(--line)}
  #app{display:none}
  .gate{max-width:380px;margin:8vh auto 0;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">dV</div>

  <!-- Login -->
  <div id="gate" class="gate card">
    <h1>Inhalts-Editor</h1>
    <p class="sub">Bitte Passwort eingeben.</p>
    <input type="password" id="pw" placeholder="Passwort" autocomplete="current-password">
    <div class="row" style="justify-content:center">
      <button class="btn" id="loginBtn">Anmelden</button>
    </div>
    <div class="status" id="gateStatus"></div>
  </div>

  <!-- Editor -->
  <div id="app">
    <h1>Inhalts-Editor</h1>
    <p class="sub">Texte &amp; Bild der Startseite bearbeiten. Nach „Speichern" ist die Änderung in 1–2 Minuten live.</p>

    <div class="card">
      <h2>Startseite – Texte</h2>
      <label>Kleiner Text oben (Eyebrow)</label>
      <input type="text" id="f_hero-eyebrow" maxlength="90">
      <label>Überschrift Zeile 1</label>
      <input type="text" id="f_hero-line1" maxlength="24">
      <label>Überschrift Zeile 2</label>
      <input type="text" id="f_hero-line2" maxlength="24">
      <label>Überschrift Zeile 3</label>
      <input type="text" id="f_hero-line3" maxlength="24">
      <label>Einleitungstext</label>
      <textarea id="f_hero-lead" maxlength="340"></textarea>
      <div class="row">
        <button class="btn" id="saveText">Texte speichern</button>
        <button class="btn btn--ghost" id="reload">Aktuelle Werte laden</button>
      </div>
      <div class="status" id="textStatus"></div>
    </div>

    <div class="card">
      <h2>Startseite – Hauptbild</h2>
      <input type="file" id="img" accept="image/jpeg,image/png,image/webp">
      <p class="hint">Wird vor dem Hochladen automatisch verkleinert. JPG/PNG/WebP.</p>
      <img class="preview" id="preview" style="display:none" alt="Vorschau">
      <div class="row">
        <button class="btn" id="saveImg" disabled>Bild speichern</button>
      </div>
      <div class="status" id="imgStatus"></div>
    </div>

    <div class="row">
      <button class="btn btn--ghost" id="logout">Abmelden</button>
      <a class="btn btn--ghost" href="../index.html" target="_blank" rel="noopener">Seite ansehen ↗</a>
    </div>
  </div>
</div>

<script>
(function(){
  var FN = "https://vxwjgxdlnwhatnbhjabw.supabase.co/functions/v1/devries-edit";
  var FIELDS = ["hero-eyebrow","hero-line1","hero-line2","hero-line3","hero-lead"];
  var $ = function(id){ return document.getElementById(id); };
  var pw = "";

  function setStatus(el, msg, kind){ el.textContent = msg; el.className = "status" + (kind?(" "+kind):""); }

  async function loadCurrent(){
    try{
      var res = await fetch("../index.html?ts=" + Date.now(), {cache:"no-store"});
      var html = await res.text();
      var doc = new DOMParser().parseFromString(html, "text/html");
      FIELDS.forEach(function(k){
        var node = doc.querySelector('[data-ed="'+k+'"]');
        if(node) $("f_"+k).value = node.textContent.trim();
      });
      setStatus($("textStatus"), "Aktuelle Werte geladen.", "ok");
    }catch(e){ setStatus($("textStatus"), "Konnte aktuelle Werte nicht laden.", "err"); }
  }

  async function call(payload){
    payload.password = pw;
    var r = await fetch(FN, {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload)});
    var d = await r.json().catch(function(){return {};});
    return {status:r.status, ok:r.ok, d:d};
  }

  // Login
  function login(){
    pw = $("pw").value;
    if(!pw){ setStatus($("gateStatus"),"Bitte Passwort eingeben.","err"); return; }
    sessionStorage.setItem("dv_ed_pw", pw);
    $("gate").style.display="none"; $("app").style.display="block";
    loadCurrent();
  }
  $("loginBtn").addEventListener("click", login);
  $("pw").addEventListener("keydown", function(e){ if(e.key==="Enter") login(); });
  var saved = sessionStorage.getItem("dv_ed_pw");
  if(saved){ pw = saved; $("gate").style.display="none"; $("app").style.display="block"; loadCurrent(); }

  $("logout").addEventListener("click", function(){ sessionStorage.removeItem("dv_ed_pw"); location.reload(); });
  $("reload").addEventListener("click", loadCurrent);

  // Save texts
  $("saveText").addEventListener("click", async function(){
    var btn=this; btn.disabled=true; setStatus($("textStatus"),"Wird gespeichert …");
    var fields={}; FIELDS.forEach(function(k){ fields[k]=$("f_"+k).value; });
    try{
      var res = await call({action:"save-home", fields:fields});
      if(res.ok){ setStatus($("textStatus"),"Gespeichert! In 1–2 Min live.","ok"); }
      else if(res.status===401){ setStatus($("textStatus"),"Falsches Passwort.","err"); }
      else if(res.status===429){ setStatus($("textStatus"),"Zu viele Versuche – bitte später erneut.","err"); }
      else if(res.d&&res.d.error==="not_configured"){ setStatus($("textStatus"),"Editor noch nicht fertig eingerichtet (Schlüssel/Passwort fehlen).","err"); }
      else { setStatus($("textStatus"),"Fehler: "+(res.d.error||res.status),"err"); }
    }catch(e){ setStatus($("textStatus"),"Verbindungsfehler.","err"); }
    btn.disabled=false;
  });

  // Image: pick -> downscale -> preview
  var imgB64=null;
  $("img").addEventListener("change", function(){
    var file=this.files[0]; if(!file) return;
    var img=new Image(); var url=URL.createObjectURL(file);
    img.onload=function(){
      var max=1400, w=img.width, h=img.height;
      if(w>max){ h=Math.round(h*max/w); w=max; }
      var c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      var dataUrl=c.toDataURL("image/jpeg",0.82);
      imgB64=dataUrl.split(",")[1];
      var p=$("preview"); p.src=dataUrl; p.style.display="block";
      $("saveImg").disabled=false;
      URL.revokeObjectURL(url);
    };
    img.src=url;
  });
  $("saveImg").addEventListener("click", async function(){
    if(!imgB64) return; var btn=this; btn.disabled=true; setStatus($("imgStatus"),"Bild wird hochgeladen …");
    try{
      var res = await call({action:"upload-image", slot:"hero", dataBase64: imgB64});
      if(res.ok){ setStatus($("imgStatus"),"Bild gespeichert! In 1–2 Min live.","ok"); }
      else if(res.status===401){ setStatus($("imgStatus"),"Falsches Passwort.","err"); }
      else if(res.status===429){ setStatus($("imgStatus"),"Zu viele Versuche – bitte später.","err"); }
      else { setStatus($("imgStatus"),"Fehler: "+(res.d.error||res.status),"err"); }
    }catch(e){ setStatus($("imgStatus"),"Verbindungsfehler.","err"); }
    btn.disabled=false;
  });
})();
</script>
</body>
</html>
