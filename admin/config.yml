# Konfiguration des Inhalts-Editors (Sveltia CMS, Decap-kompatibel).
# WICHTIG: "base_url" wird erst nach dem Login-Setup eingetragen (siehe SETUP-CMS.md).

backend:
  name: github
  repo: Chaos20140/de-vries-website
  branch: main
  # base_url: https://DEIN-AUTH-WORKER.workers.dev   # <- nach Schritt 2 in SETUP-CMS.md eintragen

# Sprache der Oberfläche
locale: de

# Medien (Bilder) werden hier verwaltet – Upload/Austausch direkt über den Editor
media_folder: "assets/img"
public_folder: "assets/img"

collections:
  # ── Globale Einstellungen (werden in Stufe 2 in die Seiten eingebunden) ──
  - name: einstellungen
    label: "Einstellungen"
    files:
      - name: kontakt
        label: "Kontaktdaten & Öffnungszeiten"
        file: "_data/site.yml"
        fields:
          - { label: "Telefon (angezeigt)", name: telefon, widget: string }
          - { label: "Telefon-Link (nur Ziffern, z. B. 051531552)", name: telefon_link, widget: string }
          - { label: "E-Mail", name: email, widget: string }
          - { label: "Straße", name: strasse, widget: string }
          - { label: "PLZ & Ort", name: plz_ort, widget: string }
          - { label: "Öffnungszeiten", name: oeffnungszeiten, widget: text }
